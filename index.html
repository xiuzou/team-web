<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>技能丢不队</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{
    font-family:微软雅黑;
    padding:60px;
    max-width:1000px;
    margin:0 auto;
    background:url(https://picsum.photos/1920/1080?blur=2);
    background-size:cover;
    background-position:center;
    background-attachment:fixed;
    background-color:rgba(255,255,255,0.85);
    background-blend-mode:lighten;
  }
  h1{
    font-size:42px;
    margin-bottom:50px;
    text-align:center;
    background:rgba(255,255,255,0.6);
    padding:20px;
    border-radius:12px;
  }
  .member-list{
    margin:40px 0;
    background:rgba(255,255,255,0.6);
    padding:30px;
    border-radius:12px;
  }
  .member-list h2{
    font-size:28px;
    margin-bottom:30px;
  }
  .member-list li{
    font-size:20px;
    margin:12px 0;
    cursor:pointer;
    color:#2c3e50;
  }
  .member-list li:hover{
    color:#3498db;
  }
  .group-photo{
    text-align:right;
    margin-top:80px;
    background:rgba(255,255,255,0.6);
    padding:30px;
    border-radius:12px;
  }
  #groupImg{
    max-width:400px;
    border-radius:8px;
    cursor:pointer;
  }
</style>
</head>
<body>

<h1>Hello，这是技能丢不队</h1>

<div class="member-list">
  <h2>成员：</h2>
  <ul>
    <li onclick="go('刘洋')">刘洋</li>
    <li onclick="go('吕浩')">吕浩</li>
    <li onclick="go('汪偌萱')">汪偌萱</li>
    <li onclick="go('夏梓鸿')">夏梓鸿</li>
    <li onclick="go('曾译樊')">曾译樊</li>
  </ul>
</div>

<div class="group-photo">
  <h2>大合照（点击查看）</h2>
  <div id="cover"></div>
</div>

<script>
  const OWNER = "xiuzou";
  const REPO = "team-web";
  const TOKEN = "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";

  async function loadCover() {
    try{
      const r = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/data/group.json`);
      if (r.ok) {
        const data = await r.json();
        const content = JSON.parse(atob(data.content));
        if (content.photos?.length) {
          document.getElementById("cover").innerHTML = `<img id="groupImg" src="${content.photos[0]}" onclick="location.href='group.html'">`;
        } else {
          document.getElementById("cover").innerHTML = "<p onclick='location.href=`group.html`'>点击上传大合照</p>";
        }
      }
    }catch(e){
      document.getElementById("cover").innerHTML = "<p onclick='location.href=`group.html`'>点击上传大合照</p>";
    }
  }

  function go(name) {
    location.href = `member.html?name=${name}`;
  }

  loadCover();
</script>
</body>
</html>
