<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>жҠҖиғҪдёўдёҚйҳҹ</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: "еҫ®иҪҜйӣ…й»‘", serif;
            padding: 60px;
            max-width: 1000px;
            margin: 0 auto;
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-color: rgba(255,255,255,0.85);
            background-blend-mode: lighten;
        }
        h1 {
            font-size: 42px;
            margin-bottom: 50px;
            text-align: center;
            background: rgba(255,255,255,0.6);
            padding: 20px;
            border-radius: 12px;
        }
        .member-list {
            margin: 40px 0;
            background: rgba(255,255,255,0.6);
            padding: 30px;
            border-radius: 12px;
        }
        .member-list h2 {
            font-size: 28px;
            margin-bottom: 30px;
        }
        .member-list ul {
            list-style: none;
            margin-left: 40px;
        }
        .member-list li {
            font-size: 20px;
            margin: 12px 0;
            cursor: pointer;
            color: #2c3e50;
        }
        .member-list li:hover {
            color: #3498db;
            text-decoration: underline;
        }
        .group-photo {
            text-align: right;
            margin-top: 80px;
            background: rgba(255,255,255,0.6);
            padding: 30px;
            border-radius: 12px;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .group-photo:hover {
            transform: scale(1.01);
        }
        .group-photo h2 {
            font-size: 32px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <h1>HelloпјҢиҝҷжҳҜжҠҖиғҪдёўдёҚйҳҹ</h1>

    <div class="member-list">
        <h2>жҲҗе‘ҳпјҡ</h2>
        <ul>
            <li onclick="goToMember('еҲҳжҙӢ')">еҲҳжҙӢ</li>
            <li onclick="goToMember('еҗ•жө©')">еҗ•жө©</li>
            <li onclick="goToMember('жұӘеҒҢиҗұ')">жұӘеҒҢиҗұ</li>
            <li onclick="goToMember('еӨҸжў“йёҝ')">еӨҸжў“йёҝ</li>
            <li onclick="goToMember('жӣҫиҜ‘жЁҠ')">жӣҫиҜ‘жЁҠ</li>
        </ul>
    </div>

    <div class="group-photo" onclick="goToGroupPage()">
        <h2>еӨ§еҗҲз…§пјҲзӮ№еҮ»жҹҘзңӢпјү</h2>
        <div id="groupImgContainer"></div>
    </div>

    <script>
        // е·ІеЎ«еҘҪдҪ зҡ„еҜҶй’ҘпјҢж— йңҖдҝ®ж”№
        const IMGBB_KEY = "aceb30e32004fff42105312105416d1d";
        const JSONBIN_KEY = "$2a$10$udvwVnoyqjR54j7Pm7pdheeur4XmJN0cmI8fo2Mouqhb5K8cN6sHO";
        const BIN_ID = "69af813bae596e708f731d1b";

        // йҡҸжңәиғҢжҷҜ
        function setRandomBackground() {
            const random = Math.floor(Math.random() * 1000);
            document.body.style.backgroundImage = `url(https://picsum.photos/1920/1080?random=${random})`;
        }

        // и·іиҪ¬еҠҹиғҪ
        function goToMember(name) {
            window.location.href = `./member.html?name=${encodeURIComponent(name)}`;
        }
        function goToGroupPage() {
            window.location.href = "./group.html";
        }

        // еҠ иҪҪеӨ§еҗҲз…§е°ҒйқўпјҲз»ҲжһҒе®№й”ҷпјү
        async function loadGroupCover() {
            const container = document.getElementById('groupImgContainer');
            try {
                const res = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, {
                    headers: { "X-Master-Key": JSONBIN_KEY }
                });
                const data = await res.json();
                const photos = (data && data.record && data.record.groupPhotos) || [];
                if (photos.length > 0) {
                    container.innerHTML = `<img id="groupImg" src="${photos[0]}" alt="еӨ§еҗҲз…§" style="max-width:400px;border-radius:8px;">`;
                } else {
                    container.innerHTML = '<p>жҡӮж— еӨ§еҗҲз…§пјҢзӮ№еҮ»дёҠдј </p>';
                }
            } catch (e) {
                container.innerHTML = '<p>зӮ№еҮ»жҹҘзңӢеӨ§еҗҲз…§</p>';
            }
        }

        // еҲқе§ӢеҢ–
        setRandomBackground();
        window.onload = loadGroupCover;
    </script>
</body>
</html>
