<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>技能丢不队</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: "微软雅黑", serif;
            padding: 60px;
            max-width: 1000px;
            margin: 0 auto;
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-color: rgba(255,255,255,0.85);
            background-blend-mode: lighten;
        }
        h1 {
            font-size: 42px;
            margin-bottom: 50px;
            text-align: center;
            background: rgba(255,255,255,0.6);
            padding: 20px;
            border-radius: 12px;
        }
        .member-list {
            margin: 40px 0;
            background: rgba(255,255,255,0.6);
            padding: 30px;
            border-radius: 12px;
        }
        .member-list h2 {
            font-size: 28px;
            margin-bottom: 30px;
        }
        .member-list ul {
            list-style: none;
            margin-left: 40px;
        }
        .member-list li {
            font-size: 20px;
            margin: 12px 0;
            cursor: pointer;
            color: #2c3e50;
        }
        .member-list li:hover {
            color: #3498db;
            text-decoration: underline;
        }
        .group-photo {
            text-align: right;
            margin-top: 80px;
            background: rgba(255,255,255,0.6);
            padding: 30px;
            border-radius: 12px;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .group-photo:hover {
            transform: scale(1.01);
        }
        .group-photo h2 {
            font-size: 32px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <h1>Hello，这是技能丢不队</h1>

    <div class="member-list">
        <h2>成员：</h2>
        <ul>
            <li onclick="goToMember('刘洋')">刘洋</li>
            <li onclick="goToMember('吕浩')">吕浩</li>
            <li onclick="goToMember('汪偌萱')">汪偌萱</li>
            <li onclick="goToMember('夏梓鸿')">夏梓鸿</li>
            <li onclick="goToMember('曾译樊')">曾译樊</li>
        </ul>
    </div>

    <div class="group-photo" onclick="goToGroupPage()">
        <h2>大合照（点击查看）</h2>
        <div id="groupImgContainer"></div>
    </div>

    <script>
        const IMGBB_KEY = "aceb30e32004fff42105312105416d1d";
        const JSONBIN_KEY = "$2a$10$udvwVnoyqjR54j7Pm7pdheeur4XmJN0cmI8fo2Mouqhb5K8cN6sHO";
        const BIN_ID = "69af813bae596e708f731d1b";

        function setRandomBackground() {
            const random = Math.floor(Math.random() * 1000);
            document.body.style.backgroundImage = `url(https://picsum.photos/1920/1080?random=${random})`;
        }

        function goToMember(name) {
            window.location.href = `./member.html?name=${encodeURIComponent(name)}`;
        }
        function goToGroupPage() {
            window.location.href = "./group.html";
        }

        async function loadGroupCover() {
            const container = document.getElementById('groupImgContainer');
            try {
                const res = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, {
                    headers: { "X-Master-Key": JSONBIN_KEY }
                });
                const data = await res.json();
                const photos = data?.record?.groupPhotos || [];
                if (photos.length > 0) {
                    container.innerHTML = `<img id="groupImg" src="${photos[0]}" alt="大合照" style="max-width:400px;border-radius:8px;">`;
                } else {
                    container.innerHTML = '<p>暂无大合照，点击上传</p>';
                }
            } catch (e) {
                container.innerHTML = '<p>点击查看大合照</p>';
            }
        }

        setRandomBackground();
        window.onload = loadGroupCover;
    </script>
</body>
</html>
