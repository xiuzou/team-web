<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>成员</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{
            font-family:微软雅黑;
            padding:40px;
            background:url(https://picsum.photos/1920/1080?blur=2);
            background-size:cover;
            background-attachment:fixed;
            background-color:rgba(255,255,255,0.85);
            background-blend-mode:lighten;
        }
        .back{padding:8px 16px;background:#3498db;color:white;border:none;border-radius:4px;cursor:pointer}
        .card{background:rgba(255,255,255,0.8);padding:30px;border-radius:16px;max-width:700px;margin:40px auto}
        img{max-width:200px;border-radius:10px;margin:10px 0}
        textarea{width:100%;height:200px;margin:10px 0;padding:10px}
        button{padding:10px 20px;background:#27ae60;color:white;border:none;border-radius:6px;cursor:pointer}
    </style>
</head>
<body>
    <button class="back" onclick="location.href='index.html'">← 返回</button>
    <div class="card">
        <h1 id="name"></h1>
        <input type="file" id="p" accept="image/*">
        <button onclick="upPhoto()">上传照片</button>
        <div id="img"></div>
        <h3>履历</h3>
        <textarea id="intro"></textarea>
        <button onclick="save()">保存履历</button>
    </div>

<script>
const OWNER = "xiuzou";
const REPO = "team-web";
const TOKEN = "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";
const name = new URLSearchParams(location.search).get("name");
document.getElementById("name").innerText = name;
const PATH = `data/member_${name}.json`;

async function load() {
    try {
        const r = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/${PATH}`);
        const d = await r.json();
        window.sha = d.sha;
        const c = JSON.parse(atob(d.content));
        if(c.img) document.getElementById("img").innerHTML=`<img src="${c.img}">`;
        if(c.intro) document.getElementById("intro").value=c.intro;
    }catch(e){}
}

async function upPhoto() {
    const file = document.getElementById("p").files[0];
    if(!file){alert("选图");return}
    const img = await new Promise(r=>{
        const fr=new FileReader();
        fr.onload=e=>r(e.target.result);
        fr.readAsDataURL(file);
    });
    const intro = document.getElementById("intro").value;
    await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/${PATH}`,{
        method:"PUT",
        headers:{Authorization:"token "+TOKEN},
        body:JSON.stringify({
            message:"photo",
            sha:window.sha,
            content:btoa(JSON.stringify({img,intro}))
        })
    });
    alert("照片云端保存成功！");
    load();
}

async function save() {
    const intro = document.getElementById("intro").value;
    const img = document.querySelector("img")?.src||"";
    await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/${PATH}`,{
        method:"PUT",
        headers:{Authorization:"token "+TOKEN},
        body:JSON.stringify({
            message:"save",
            sha:window.sha,
            content:btoa(JSON.stringify({img,intro}))
        })
    });
    alert("保存成功！");
    load();
}
load();
</script>
</body>
</html>
