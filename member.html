<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>成员资料</title>
<style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{
        font-family:微软雅黑;
        padding:40px;
        background-size:cover;
        background-attachment:fixed;
        background-position:center;
        background-color:rgba(255,255,255,0.85);
        background-blend-mode:lighten;
        min-height:100vh;
    }
    .back{padding:8px 16px;background:#3498db;color:white;border:none;border-radius:6px;cursor:pointer}
    .card{background:rgba(255,255,255,0.7);padding:30px;border-radius:16px;max-width:700px;margin:40px auto;text-align:center}
    h1{margin:20px 0}
    #avatar{max-width:220px;border-radius:10px;margin:15px 0}
    textarea{width:100%;height:200px;padding:12px;border-radius:8px;margin:10px 0}
    button{padding:10px 20px;background:#27ae60;color:white;border:none;border-radius:8px;cursor:pointer;margin:5px}
    .delete-btn{background:#e74c3c}
</style>
</head>
<body>

<button class="back" onclick="location.href='index.html'">← 返回主页</button>
<div class="card">
    <h1 id="name">成员资料</h1>
    
    <input type="file" id="photo" accept="image/*">
    <button onclick="uploadPhoto()">上传照片（自动压缩）</button>
    <button id="deletePhotoBtn" class="delete-btn" onclick="deletePhoto()" style="display:none">删除当前照片</button>
    <div id="photoBox"></div>

    <h3>个人履历</h3>
    <textarea id="intro"></textarea>
    <button onclick="saveIntro()">保存履历</button>
</div>

<script>
// 随机背景
function setRandomBackground() {
    const random = Math.floor(Math.random() * 1000);
    document.body.style.backgroundImage = `url(https://picsum.photos/1920/1080?random=${random})`;
}

// 压缩图片 + 转永久base64（修复不显示的核心！）
function compressImage(file) {
    return new Promise(resolve => {
        const reader = new FileReader();
        reader.onload = e => {
            const img = new Image();
            img.onload = () => {
                const canvas = document.createElement('canvas');
                let w = img.width, h = img.height;
                if(w > 800) { h = h * 800 / w; w = 800; }
                canvas.width = w; canvas.height = h;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0,0,w,h);
                // 转成永久存储的base64，不再失效
                resolve(canvas.toDataURL('image/jpeg', 0.6));
            };
            img.src = e.target.result;
        };
        reader.readAsDataURL(file);
    });
}

// 获取成员姓名
const params = new URLSearchParams(location.search);
const name = params.get('name') || '成员';
document.getElementById('name').innerText = name;
const key = 'member_' + name;

// 加载数据
function loadData() {
    const data = JSON.parse(localStorage.getItem(key) || '{"photo":"","intro":""}');
    const deleteBtn = document.getElementById('deletePhotoBtn');
    const photoBox = document.getElementById('photoBox');
    
    if(data.photo) {
        photoBox.innerHTML = `<img id="avatar" src="${data.photo}">`;
        deleteBtn.style.display = 'inline-block';
    } else {
        photoBox.innerHTML = '';
        deleteBtn.style.display = 'none';
    }
    document.getElementById('intro').value = data.intro || '';
}

// 上传照片（永久保存）
async function uploadPhoto() {
    const file = document.getElementById('photo').files[0];
    if(!file) { alert('请选择照片！'); return; }
    
    // 压缩+转永久格式
    const base64 = await compressImage(file);
    const data = JSON.parse(localStorage.getItem(key) || '{"photo":"","intro":""}');
    data.photo = base64;
    localStorage.setItem(key, JSON.stringify(data));
    
    alert('照片上传成功！永久保存！');
    loadData();
}

// 删除照片
function deletePhoto() {
    if(confirm('确定删除照片？')) {
        const data = JSON.parse(localStorage.getItem(key) || '{"photo":"","intro":""}');
        data.photo = '';
        localStorage.setItem(key, JSON.stringify(data));
        loadData();
        alert('已删除！');
    }
}

// 保存履历
function saveIntro() {
    const intro = document.getElementById('intro').value;
    const data = JSON.parse(localStorage.getItem(key) || '{"photo":"","intro":""}');
    data.intro = intro;
    localStorage.setItem(key, JSON.stringify(data));
    alert('履历保存成功！');
}

// 初始化
setRandomBackground();
loadData();
</script>
</body>
</html>
