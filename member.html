<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>成员资料</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{
    font-family:微软雅黑;
    padding:40px;
    background:url(https://picsum.photos/1920/1080?blur=2);
    background-size:cover;
    background-position:center;
    background-attachment:fixed;
    background-color:rgba(255,255,255,0.85);
    background-blend-mode:lighten;
  }
  .card{
    background:rgba(255,255,255,0.7);
    padding:30px;
    border-radius:16px;
    max-width:800px;
    margin:40px auto;
  }
  h1{
    text-align:center;
    margin-bottom:20px;
  }
  .back{
    padding:8px 16px;
    background:#3498db;
    color:white;
    border:none;
    border-radius:6px;
    cursor:pointer;
  }
  #avatar{
    max-width:220px;
    border-radius:10px;
    margin:10px 0;
  }
  textarea{
    width:100%;
    height:200px;
    padding:12px;
    border-radius:8px;
    margin-top:10px;
  }
  button{
    padding:10px 20px;
    background:#27ae60;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
    margin:5px;
  }
</style>
</head>
<body>

<button class="back" onclick="location.href='index.html'">← 返回</button>
<div class="card">
  <h1 id="name"></h1>
  <input type="file" id="photo" accept="image/*">
  <button onclick="savePhoto()">上传照片到云端</button>
  <div id="photoArea"></div>

  <h3>个人履历</h3>
  <textarea id="intro"></textarea>
  <button onclick="saveIntro()">保存履历到云端</button>
</div>

<script>
  const OWNER = "xiuzou";
  const REPO = "team-web";
  const TOKEN = "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";

  const params = new URLSearchParams(location.search);
  const name = params.get('name');
  document.getElementById('name').innerText = name;
  const PATH = `data/member_${name}.json`;

  async function load() {
    try{
      const r = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/${PATH}`);
      if (r.ok) {
        const data = await r.json();
        const content = JSON.parse(atob(data.content));
        if (content.photo) {
          document.getElementById("photoArea").innerHTML = `<img id="avatar" src="${content.photo}">`;
        }
        if (content.intro) {
          document.getElementById("intro").value = content.intro;
        }
        window.__sha = data.sha;
      }
    }catch(e){}
  }

  async function savePhoto() {
    const file = document.getElementById("photo").files[0];
    if (!file) return alert("请选择图片");
    const photo = await new Promise(r => {
      const fr = new FileReader();
      fr.onload = e => r(e.target.result);
      fr.readAsDataURL(file);
    });

    const body = {
      message: "更新" + name + "照片",
      content: btoa(JSON.stringify({ photo, intro: document.getElementById("intro").value })),
      sha: window.__sha
    };

    await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/${PATH}`, {
      method: "PUT",
      headers: { Authorization: `token ${TOKEN}`, "Content-Type": "application/json" },
      body: JSON.stringify(body)
    });

    alert("照片已同步到云端！所有人可见！");
    load();
  }

  async function saveIntro() {
    const intro = document.getElementById("intro").value;
    const body = {
      message: "更新" + name + "履历",
      content: btoa(JSON.stringify({ photo: document.getElementById("avatar")?.src || "", intro })),
      sha: window.__sha
    };
    await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/${PATH}`, {
      method: "PUT",
      headers: { Authorization: `token ${TOKEN}`, "Content-Type": "application/json" },
      body: JSON.stringify(body)
    });
    alert("履历云端保存成功！");
    load();
  }

  load();
</script>
</body>
</html>
