<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>大合照</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{
    font-family:微软雅黑;
    padding:40px;
    text-align:center;
    background:url(https://picsum.photos/1920/1080?blur=2);
    background-size:cover;
    background-position:center;
    background-attachment:fixed;
    background-color:rgba(255,255,255,0.85);
    background-blend-mode:lighten;
  }
  .back{
    padding:8px 16px;
    background:#3498db;
    color:white;
    border:none;
    border-radius:4px;
    cursor:pointer;
    margin-bottom:20px;
  }
  h1{
    background:rgba(255,255,255,0.6);
    padding:20px;
    border-radius:12px;
    display:inline-block;
  }
  #photos{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:20px;
    margin-top:30px;
  }
  #photos img{
    max-width:300px;
    border-radius:10px;
  }
  button{
    padding:10px 20px;
    background:#3498db;
    color:white;
    border:none;
    border-radius:6px;
    cursor:pointer;
    margin:10px;
  }
</style>
</head>
<body>

<button class="back" onclick="location.href='index.html'">← 返回</button>
<h1>团队大合照</h1>

<input type="file" id="file" accept="image/*" multiple>
<button onclick="upload()">上传并同步到云端</button>
<div id="photos"></div>

<script>
  const OWNER = "xiuzou";
  const REPO = "team-web";
  const TOKEN = "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";
  const PATH = "data/group.json";

  async function load() {
    try{
      const r = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/${PATH}`);
      const box = document.getElementById("photos");
      box.innerHTML = "";
      if (r.ok) {
        const data = await r.json();
        const content = JSON.parse(atob(data.content));
        (content.photos || []).forEach(p => {
          const img = document.createElement("img");
          img.src = p;
          box.appendChild(img);
        });
        window.__sha = data.sha;
      }
    }catch(e){
      document.getElementById("photos").innerHTML = "<p>暂无合照，点击上传</p>";
    }
  }

  async function upload() {
    const files = document.getElementById("file").files;
    if (!files.length) return alert("请选择图片");
    const photos = [];
    for (let f of files) {
      const p = await new Promise(r => {
        const fr = new FileReader();
        fr.onload = e => r(e.target.result);
        fr.readAsDataURL(f);
      });
      photos.push(p);
    }

    const oldPhotos = [];
    try {
      const r = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/${PATH}`);
      if (r.ok) {
        const d = await r.json();
        const c = JSON.parse(atob(d.content));
        oldPhotos.push(...(c.photos || []));
        window.__sha = d.sha;
      }
    } catch (e) {}

    const body = {
      message: "更新大合照",
      content: btoa(JSON.stringify({ photos: [...oldPhotos, ...photos] })),
      sha: window.__sha
    };

    await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/${PATH}`, {
      method: "PUT",
      headers: { Authorization: `token ${TOKEN}`, "Content-Type": "application/json" },
      body: JSON.stringify(body)
    });

    alert("同步成功！所有人都能看见！");
    load();
  }

  load();
</script>
</body>
</html>
