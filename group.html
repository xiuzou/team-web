<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>团队大合照</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: "微软雅黑", serif;
            padding: 40px;
            text-align: center;
            background-image: url('https://picsum.photos/1920/1080?blur=2');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-color: rgba(255,255,255,0.85);
            background-blend-mode: lighten;
        }
        .back-btn {
            padding: 8px 16px;
            background: #3498db;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            margin-bottom: 20px;
        }
        h1 {
            margin-bottom: 20px;
            background: rgba(255,255,255,0.6);
            padding: 20px;
            border-radius: 12px;
            display: inline-block;
        }
        #groupImgContainer {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            margin-top: 30px;
        }
        #groupImgContainer img {
            max-width: 300px;
            max-height: 300px;
            border-radius: 10px;
            box-shadow: 0 3px 15px rgba(0,0,0,0.15);
        }
        input[type="file"] {
            margin: 20px 0;
            padding: 8px;
            background: rgba(255,255,255,0.6);
            padding: 10px;
            border-radius: 8px;
        }
        button {
            padding: 10px 20px;
            background: #3498db;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <button class="back-btn" onclick="goBack()">← 返回主页</button>
    <h1>团队大合照（可上传多张）</h1>

    <input type="file" id="groupFile" accept="image/*" multiple>
    <button onclick="uploadGroupPhoto()">上传大合照</button>
    <div id="groupImgContainer"></div>

    <script>
        function goBack() {
            window.location.href = "index.html";
        }
        function loadGroupPhotos() {
            const container = document.getElementById('groupImgContainer');
            container.innerHTML = '';
            const photos = JSON.parse(localStorage.getItem('groupPhotos') || '[]');
            photos.forEach(src => {
                const img = document.createElement('img');
                img.src = src;
                container.appendChild(img);
            });
        }
        function uploadGroupPhoto() {
            const input = document.getElementById('groupFile');
            const files = input.files;
            if (!files.length) return alert("请选择图片！");
            const photos = JSON.parse(localStorage.getItem('groupPhotos') || '[]');
            let count = 0;
            for (let i = 0; i < files.length; i++) {
                const reader = new FileReader();
                reader.onload = e => {
                    photos.push(e.target.result);
                    localStorage.setItem('groupPhotos', JSON.stringify(photos));
                    count++;
                    if (count === files.length) {
                        loadGroupPhotos();
                        alert("上传成功！");
                    }
                };
                reader.readAsDataURL(files[i]);
            }
            input.value = '';
        }
        window.onload = loadGroupPhotos;
    </script>
</body>
</html>
