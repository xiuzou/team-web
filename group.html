<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>大合照</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{padding:40px;text-align:center;background:#f7f7f7}
  .back{margin:10px;padding:8px 16px}
  #photos{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;margin-top:20px}
  #photos img{max-width:200px;border-radius:8px}
  .upload{margin:20px 0}
</style>
</head>
<body>

<button class="back" onclick="location.href='index.html'">返回主页</button>
<h1>大合照（已自动压缩）</h1>

<div class="upload">
  <input type="file" id="file" accept="image/*" multiple>
  <button onclick="upload()">上传并保存</button>
</div>

<div id="photos"></div>

<script>
// 图片压缩
function compressImage(file) {
  return new Promise(resolve => {
    const reader = new FileReader()
    reader.onload = e => {
      const img = new Image()
      img.onload = () => {
        const canvas = document.createElement('canvas')
        let w = img.width, h = img.height
        if (w > 1000) { h = h * 1000 / w; w = 1000 }
        canvas.width = w; canvas.height = h
        canvas.getContext('2d').drawImage(img,0,0,w,h)
        canvas.toBlob(blob => resolve(blob), 'image/jpeg', 0.6)
      }
      img.src = e.target.result
    }
    reader.readAsDataURL(file)
  })
}

// 显示图片
function show() {
  const list = JSON.parse(localStorage.getItem('group') || '[]')
  const box = document.getElementById('photos')
  box.innerHTML = ''
  list.forEach(u => {
    const img = document.createElement('img')
    img.src = u
    box.appendChild(img)
  })
}

// 上传 + 压缩 + 保存
async function upload() {
  const files = document.getElementById('file').files
  if (!files.length) return alert('请选图')

  const list = JSON.parse(localStorage.getItem('group') || '[]')

  for (let i = 0; i < files.length; i++) {
    const blob = await compressImage(files[i])
    const url = URL.createObjectURL(blob)
    list.push(url)
  }

  localStorage.setItem('group', JSON.stringify(list))
  alert('上传并压缩成功！')
  show()
}

show()
</script>
</body>
</html>
