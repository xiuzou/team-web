<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>团队大合照</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: "微软雅黑", serif;
            padding: 40px;
            text-align: center;
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-color: rgba(255,255,255,0.85);
            background-blend-mode: lighten;
            min-height: 100vh;
        }
        .back-btn {
            padding: 8px 16px;
            background: #3498db;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            margin-bottom: 20px;
        }
        h1 {
            margin-bottom: 20px;
            background: rgba(255,255,255,0.6);
            padding: 20px;
            border-radius: 12px;
            display: inline-block;
        }
        #groupImgContainer {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            margin-top: 30px;
        }
        .photo-item {
            position: relative;
            width: 300px;
            height: 300px;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 3px 15px rgba(0,0,0,0.15);
        }
        .photo-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .delete-btn {
            position: absolute;
            top: 8px;
            right: 8px;
            width: 30px;
            height: 30px;
            background: #e74c3c;
            color: white;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .upload-area {
            margin: 20px 0;
            background: rgba(255,255,255,0.6);
            padding: 20px;
            border-radius: 12px;
            display: inline-block;
        }
        input[type="file"] {
            margin: 10px 0;
            padding: 8px;
        }
        button {
            padding: 10px 20px;
            background: #3498db;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }
        #tip {
            margin-top: 10px;
            font-size: 14px;
            color: #e74c3c;
            white-space: pre-wrap;
            max-width: 900px;
            margin-left: auto;
            margin-right: auto;
        }
    </style>
</head>
<body>
    <button class="back-btn" onclick="goBack()">← 返回主页</button>
    <h1>团队大合照（全员云端同步）</h1>

    <div class="upload-area">
        <input type="file" id="groupFile" accept="image/*" multiple>
        <button onclick="uploadGroupPhoto()">确认上传到云端</button>
        <p id="tip"></p>
    </div>
    
    <div id="groupImgContainer"></div>

    <script>
        // 已填好你的所有密钥，无需修改
        const IMGBB_KEY = "aceb30e32004fff42105312105416d1d";
        const JSONBIN_KEY = "$2a$10$udvwVnoyqjR54j7Pm7pdheeur4XmJN0cmI8fo2Mouqhb5K8cN6sHO";
        const BIN_ID = "69af813bae596e708f731d1b";

        // 随机背景
        function setRandomBackground() {
            const random = Math.floor(Math.random() * 1000);
            document.body.style.backgroundImage = `url(https://picsum.photos/1920/1080?random=${random})`;
        }

        // 返回主页
        function goBack() {
            window.location.href = "./index.html";
        }

        // 图片压缩
        function compressImage(file, maxWidth = 1200, quality = 0.6) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        let width = img.width;
                        let height = img.height;
                        if (width > maxWidth) {
                            height = height * (maxWidth / width);
                            width = maxWidth;
                        }
                        canvas.width = width;
                        canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);
                        canvas.toBlob(blob => resolve(blob), 'image/jpeg', quality);
                    };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(file);
            });
        }

        // 终极容错：获取云端数据，任何情况都不会崩溃
        async function getCloudData() {
            const tip = document.getElementById('tip');
            try {
                const res = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, {
                    headers: { "X-Master-Key": JSONBIN_KEY }
                });

                // 捕获HTTP错误（401/404等）
                if (!res.ok) {
                    const errorText = await res.text();
                    throw new Error(`云端请求失败：状态码${res.status}，详情：${errorText}`);
                }

                // 解析JSON并打印到控制台，方便排查
                const data = await res.json();
                console.log("云端返回完整数据：", data);

                // 兜底：不管返回什么，都返回正确格式的默认数据
                return {
                    groupPhotos: (data && data.record && data.record.groupPhotos) || [],
                    members: (data && data.record && data.record.members) || {}
                };

            } catch (e) {
                // 所有错误都捕获，显示在页面上
                tip.innerText = `错误详情：${e.message}\n请检查BIN_ID、密钥是否正确，以及网络是否能访问jsonbin.io`;
                console.error("云端请求错误：", e);
                return { groupPhotos: [], members: {} };
            }
        }

        // 保存数据到云端
        async function saveCloudData(data) {
            const tip = document.getElementById('tip');
            try {
                const res = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, {
                    method: 'PUT',
                    headers: {
                        "Content-Type": "application/json",
                        "X-Master-Key": JSONBIN_KEY
                    },
                    body: JSON.stringify(data)
                });

                if (!res.ok) {
                    const errorText = await res.text();
                    throw new Error(`保存失败：状态码${res.status}，详情：${errorText}`);
                }

                tip.innerText = '';
                return true;

            } catch (e) {
                tip.innerText = `保存云端失败：${e.message}`;
                console.error("保存错误：", e);
                return false;
            }
        }

        // 加载并渲染合照
        async function loadGroupPhotos() {
            const container = document.getElementById('groupImgContainer');
            const tip = document.getElementById('tip');
            container.innerHTML = '';
            tip.innerText = '正在加载...';

            const cloudData = await getCloudData();
            const photos = cloudData.groupPhotos;

            if (photos.length === 0) {
                container.innerHTML = '<p>暂无大合照，请上传</p>';
                tip.innerText = '';
                return;
            }

            // 渲染所有照片
            photos.forEach((src, index) => {
                const photoItem = document.createElement('div');
                photoItem.className = 'photo-item';
                photoItem.innerHTML = `
                    <img src="${src}" alt="合照">
                    <button class="delete-btn" onclick="deleteGroupPhoto(${index})">×</button>
                `;
                container.appendChild(photoItem);
            });
            tip.innerText = `✅ 共加载 ${photos.length} 张合照`;
            tip.style.color = '#27ae60';
        }

        // 上传照片
        async function uploadGroupPhoto() {
            const input = document.getElementById('groupFile');
            const files = input.files;
            const tip = document.getElementById('tip');
            tip.innerText = '';
            tip.style.color = '#e74c3c';

            if (!files.length) {
                tip.innerText = "请先选择要上传的图片！";
                return;
            }

            let successCount = 0;
            const totalCount = files.length;
            tip.innerText = `正在上传...0/${totalCount}`;

            // 获取当前云端数据
            const cloudData = await getCloudData();
            const existPhotos = cloudData.groupPhotos;

            // 循环上传每一张
            for (let i = 0; i < files.length; i++) {
                try {
                    // 先压缩
                    const compressedBlob = await compressImage(files[i]);
                    // 上传到图床
                    const formData = new FormData();
                    formData.append('image', compressedBlob);
                    const uploadRes = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_KEY}`, {
                        method: 'POST',
                        body: formData
                    });
                    const uploadData = await uploadRes.json();
                    if (uploadData.success) {
                        existPhotos.push(uploadData.data.url);
                        successCount++;
                        tip.innerText = `正在上传...${successCount}/${totalCount}`;
                    } else {
                        throw new Error(`图床上传失败：${uploadData.error?.message || '未知错误'}`);
                    }
                } catch (e) {
                    tip.innerText += `\n第${i+1}张图上传失败：${e.message}`;
                }
            }

            // 保存到云端
            cloudData.groupPhotos = existPhotos;
            const saveSuccess = await saveCloudData(cloudData);
            
            if (saveSuccess) {
                tip.innerText = `✅ 上传完成！成功保存${successCount}/${totalCount}张，全员可查看`;
                tip.style.color = '#27ae60';
                input.value = '';
                loadGroupPhotos();
            }
        }

        // 删除合照
        async function deleteGroupPhoto(index) {
            if (!confirm('确定要删除这张合照吗？')) return;
            
            const cloudData = await getCloudData();
            const photos = cloudData.groupPhotos;
            photos.splice(index, 1);
            cloudData.groupPhotos = photos;

            const saveSuccess = await saveCloudData(cloudData);
            if (saveSuccess) {
                alert('删除成功！');
                loadGroupPhotos();
            } else {
                alert('删除失败，请查看页面提示');
            }
        }

        // 初始化
        setRandomBackground();
        window.onload = loadGroupPhotos;
    </script>
</body>
</html>
