<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>合照墙</title>
<style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{
        font-family:微软雅黑;
        padding:40px;
        /* 随机背景会自动覆盖这里 */
        background-size:cover;
        background-attachment:fixed;
        background-position:center;
        background-color:rgba(255,255,255,0.85);
        background-blend-mode:lighten;
        min-height:100vh;
    }
    .back{padding:8px 16px;background:#3498db;color:white;border:none;border-radius:6px;cursor:pointer}
    .card{background:rgba(255,255,255,0.7);padding:30px;border-radius:16px;max-width:900px;margin:40px auto;text-align:center}
    h1{margin:20px 0}
    .photo-container{display:flex;flex-wrap:wrap;gap:15px;justify-content:center;margin:20px 0}
    .photo-item{position:relative;width:200px;height:200px;border-radius:8px;overflow:hidden}
    .photo-item img{width:100%;height:100%;object-fit:cover}
    .delete-btn{position:absolute;top:5px;right:5px;background:#e74c3c;color:white;border:none;border-radius:50%;width:25px;height:25px;cursor:pointer;display:flex;align-items:center;justify-content:center}
    button{padding:10px 20px;background:#27ae60;color:white;border:none;border-radius:8px;cursor:pointer;margin:5px}
</style>
</head>
<body>

<button class="back" onclick="location.href='index.html'">← 返回主页</button>
<div class="card">
    <h1>合照墙</h1>
    
    <input type="file" id="groupPhoto" accept="image/*" multiple>
    <button onclick="uploadGroupPhoto()">上传合照（自动压缩）</button>
    <div class="photo-container" id="groupPhotosContainer"></div>

</div>

<script>
// 🔥 每次刷新自动随机切换背景
function setRandomBackground() {
    const random = Math.floor(Math.random() * 1000);
    document.body.style.backgroundImage = `url(https://picsum.photos/1920/1080?random=${random})`;
}

// 自动压缩图片
function compressImage(file) {
    return new Promise(resolve => {
        const reader = new FileReader();
        reader.onload = e => {
            const img = new Image();
            img.onload = () => {
                const canvas = document.createElement('canvas');
                let w = img.width, h = img.height;
                if(w > 600 || h > 600) {
                    const ratio = Math.min(600/w, 600/h);
                    w *= ratio;
                    h *= ratio;
                }
                canvas.width = w; canvas.height = h;
                canvas.getContext('2d').drawImage(img, 0,0,w,h);
                canvas.toBlob(blob => resolve(blob), 'image/jpeg', 0.6);
            };
            img.src = e.target.result;
        };
        reader.readAsDataURL(file);
    });
}

// 加载合照
function loadGroupPhotos() {
    const photos = JSON.parse(localStorage.getItem('groupPhotos') || '[]');
    const container = document.getElementById('groupPhotosContainer');
    container.innerHTML = '';
    
    photos.forEach((photo, index) => {
        const photoItem = document.createElement('div');
        photoItem.className = 'photo-item';
        photoItem.innerHTML = `
            <img src="${photo}">
            <button class="delete-btn" onclick="deleteGroupPhoto(${index})">×</button>
        `;
        container.appendChild(photoItem);
    });
}

// 上传合照
async function uploadGroupPhoto() {
    const files = document.getElementById('groupPhoto').files;
    if(!files.length) { alert('请选择照片！'); return; }
    
    const photos = JSON.parse(localStorage.getItem('groupPhotos') || '[]');
    
    for(const file of files) {
        const blob = await compressImage(file);
        const url = URL.createObjectURL(blob);
        photos.push(url);
    }
    
    localStorage.setItem('groupPhotos', JSON.stringify(photos));
    alert(`成功上传 ${files.length} 张合照！`);
    loadGroupPhotos();
}

// 删除合照
function deleteGroupPhoto(index) {
    if(confirm('确定要删除这张合照吗？')) {
        const photos = JSON.parse(localStorage.getItem('groupPhotos') || '[]');
        photos.splice(index, 1);
        localStorage.setItem('groupPhotos', JSON.stringify(photos));
        alert('合照已成功删除！');
        loadGroupPhotos();
    }
}

// 初始化
setRandomBackground();
loadGroupPhotos();
</script>
</body>
</html>
